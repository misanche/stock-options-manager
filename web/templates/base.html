<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Option Income Lab{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="topnav">
        <div class="nav-brand">🧪 Option Income Lab</div>
        <button class="hamburger" aria-label="Menu">☰</button>
        <div class="nav-links">
            <a href="/dashboard" class="{% if request.url.path in ('/', '/dashboard') %}active{% endif %}">Dashboard</a>
            <a href="/symbols" class="{% if request.url.path.startswith('/symbols') %}active{% endif %}">Symbols</a>
            <a href="/chat" class="{% if request.url.path == '/chat' %}active{% endif %}">Chat</a>
            <a href="/dgi" class="{% if request.url.path.startswith('/dgi') %}active{% endif %}">DGI Screener</a>
            <div class="nav-dropdown">
                <span class="nav-dropdown-trigger {% if request.url.path.startswith('/settings') %}active{% endif %}">Settings</span>
                <div class="nav-dropdown-content">
                    <a href="/settings/config">⚙️ Configuration</a>
                    <a href="/settings/runtime">📊 Runtime Stats</a>
                    <a href="/settings/debug">🔍 Debug</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
