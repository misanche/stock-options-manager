azure:
  project_endpoint: "${AZURE_AI_PROJECT_ENDPOINT}"
  model_deployment: "${MODEL_DEPLOYMENT}" # options: "gpt-5.1", "gpt-5.4-mini"
  api_key: "${AZURE_OPENAI_API_KEY}"

cosmosdb:
  endpoint: "${COSMOSDB_ENDPOINT}"
  key: "${COSMOSDB_KEY}"
  database: "stock-options-manager"

context:
  max_activity_entries: 2   # Recent activities to inject as agent context (0=none, max 5). Each includes its alert if actionable.
  activity_ttl_days: 90     # Activities older than this are auto-expired via CosmosDB TTL

scheduler:
  cron: "30 9-16/4 * * 1-5"  # Cron expression: every 2 hours, market hours (Mon-Fri 14-21 Spain / 9-16 US)
  timezone: "America/New_York"  # Timezone for scheduler (default: America/New_York)

web:
  host: "0.0.0.0"
  port: 8000

telegram:
  enabled: false
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

summary_agent:
  enabled: true
  cron: "0 8 * * *"  # 8 AM daily (America/New_York timezone)
  activity_count: 3  # Latest N activities per symbol

options_chain_scheduler:
  enabled: true
  cron: "0 * * * *"  # Every hour

# Anti-bot detection settings for TradingView data fetching
tradingview:
  request_delay_min: 1.0   # Minimum seconds between requests (default: 1.0)
  request_delay_max: 3.0   # Maximum seconds between requests (default: 3.0)
  # Note: Actual delay is randomized within this range to simulate human behavior
  warmup_enabled: false      # Visit TradingView homepage before fetching to establish cookies
  max_403_retries: 3         # Max retry attempts on 403 with session refresh + backoff
  retry_delays: [5, 15, 45]  # Backoff delays in seconds between 403 retries
  randomize_symbols: true    # Shuffle symbol order to vary access patterns

dgi_screener:
  enabled: true
  cron: "0 6 * * 1-5"  # 6 AM weekdays (America/New_York)
  seed_symbols_file: "data/sp500_symbols.txt"
  top_n: 20
  filters:
    min_yield: 0.015
    max_payout: 0.75
    max_pe: 30
    max_de: 2.0
    min_years: 3
    min_market_cap: 10000000000
    min_growth: 0.0
  score_weights:
    dividend_yield: 0.15
    dividend_growth: 0.18
    payout_safety: 0.10
    valuation: 0.10
    financial_health: 0.07
    consistency: 0.10
    technical_timing: 0.30
  technical_indicators:
    rsi_period: 14
    bb_period: 20
    bb_std: 2.0
